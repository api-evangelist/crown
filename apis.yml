aid: crown
name: Crown Holdings
x-type: company
description: >-
  Crown Holdings, Inc. is a global leader in the design, manufacture, and
  sale of rigid packaging products for consumer goods, including metal
  beverage cans and ends, food cans, aerosol cans, specialty closures and
  promotional tins, as well as transit and protective packaging products
  for industrial markets. The company operates in more than 40 countries
  and supports customers with design, decoration, reprographics, compound
  development, pilot facilities, and seaming training services. Crown
  Holdings does not publish a public developer API program; technical
  collaboration with customers happens through B2B and EDI channels.
